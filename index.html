<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raccoon Twitch Alerts</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ink:      #0f0b08;
  --mahogany: #2e1a0e;
  --copper:   #b87333;
  --gold:     #d4a855;
  --pale:     #f0e2c8;
  --cream:    #fdf6e8;
  --mist:     #c8b89a;
}

body {
  background: #00ff00;
  min-height: 100vh;
  display: flex;
  gap: 48px;
  padding: 40px;
  align-items: flex-start;
}

/* ════════════════════════════
   ALERT AREA
════════════════════════════ */
#alert-area {
  flex: 1;
  min-width: 500px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding-top: 10px;
}

.alert {
  position: relative;
  width: 500px;
  opacity: 0;
  pointer-events: none;
}

.alert.show { animation: alertIn 0.65s cubic-bezier(.16,1,.3,1) forwards; }
.alert.hide { animation: alertOut 0.45s ease forwards; }

@keyframes alertIn {
  0%   { opacity: 0; transform: translateX(-32px) scale(0.96); }
  100% { opacity: 1; transform: translateX(0) scale(1); }
}
@keyframes alertOut {
  0%   { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.97) translateX(16px); }
}

/* ── Card: no border box, just atmosphere ── */
.card {
  background: linear-gradient(150deg, rgba(28,17,8,0.97) 0%, rgba(14,9,4,0.99) 100%);
  border-radius: 2px;
  position: relative;
  padding: 20px 28px 28px 20px;
  overflow: visible;
}

/* Soft dark glow behind the whole card */
.card::before {
  content: '';
  position: absolute;
  inset: -12px;
  border-radius: 8px;
  background: radial-gradient(ellipse at center, rgba(184,115,51,0.07) 0%, transparent 70%);
  pointer-events: none;
  z-index: -1;
}

/* shimmer */
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(105deg, transparent 35%, rgba(212,168,85,0.04) 50%, transparent 65%);
  background-size: 250% 100%;
  animation: shimmer 3.5s ease infinite;
  pointer-events: none;
  border-radius: 2px;
}

@keyframes shimmer {
  0%   { background-position: 250% 0; }
  100% { background-position: -250% 0; }
}

/* ── Content layout ── */
.content {
  display: flex;
  align-items: center;
  gap: 0;
}

/* ── Raccoon ── */
.raccoon-wrap {
  flex-shrink: 0;
  width: 80px;
  height: 80px;
  position: relative;
  margin-right: 20px;
}

.raccoon-wrap svg {
  width: 80px;
  height: 80px;
  filter: drop-shadow(0 4px 14px rgba(0,0,0,0.8)) drop-shadow(0 0 8px rgba(184,115,51,0.15));
  animation: racFloat 4s ease-in-out infinite;
}

@keyframes racFloat {
  0%,100% { transform: translateY(0px) rotate(-1deg); }
  50%      { transform: translateY(-6px) rotate(1deg); }
}

/* warm glow under raccoon */
.raccoon-wrap::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 12px;
  background: radial-gradient(ellipse, rgba(184,115,51,0.3) 0%, transparent 70%);
  animation: shadowPulse 4s ease-in-out infinite;
}

@keyframes shadowPulse {
  0%,100% { opacity: 0.5; width: 56px; }
  50%      { opacity: 0.9; width: 44px; }
}

/* ── Divider ── */
.divider {
  width: 1px;
  height: 56px;
  background: linear-gradient(to bottom, transparent, rgba(184,115,51,0.4) 40%, rgba(184,115,51,0.4) 60%, transparent);
  margin-right: 22px;
  flex-shrink: 0;
}

/* ── Text ── */
.text-block { flex: 1; min-width: 0; }

.alert-type-label {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 5px;
  opacity: 0.8;
}

.alert-message {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 600;
  color: var(--cream);
  line-height: 1.22;
  text-shadow: 0 1px 16px rgba(212,168,85,0.2);
}

.alert-name { color: var(--gold); }

.alert-sub {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--mist);
  margin-top: 4px;
  opacity: 0.7;
}

/* ════════════════════════════
   FANCY UNDERLINE — ornamental SVG rule
════════════════════════════ */
.underline-wrap {
  margin-top: 14px;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.underline-svg {
  width: 100%;
  height: 18px;
  overflow: visible;
}

/* ── Per-type accent colors ── */
.alert.follower .alert-type-label  { color: #8fbf8a; }
.alert.follower .alert-name        { color: #a8d4a3; }
.alert.follower .underline-svg .accent-line { stroke: #6aab65; }
.alert.follower .underline-svg .accent-diamond { fill: #6aab65; }
.alert.follower .underline-svg .accent-glow { stop-color: #6aab65; }

.alert.subscriber .alert-type-label { color: var(--gold); }
.alert.subscriber .alert-name       { color: #f0d080; }

.alert.donation .alert-type-label  { color: #e8b96a; }
.alert.donation .alert-name        { color: #f5c878; }
.alert.donation .underline-svg .accent-line    { stroke: #c9943a; }
.alert.donation .underline-svg .accent-diamond { fill: #c9943a; }
.alert.donation .underline-svg .accent-glow    { stop-color: #c9943a; }

.alert.raid .alert-type-label  { color: #b89fd4; }
.alert.raid .alert-name        { color: #cdb8e8; }
.alert.raid .underline-svg .accent-line    { stroke: #9a7dbf; }
.alert.raid .underline-svg .accent-diamond { fill: #9a7dbf; }
.alert.raid .underline-svg .accent-glow    { stop-color: #9a7dbf; }

/* ── Particles ── */
.particle {
  position: absolute;
  pointer-events: none;
  font-size: 12px;
  opacity: 0;
  animation: particleFly var(--dur,1.4s) ease forwards;
}

@keyframes particleFly {
  0%   { opacity: 0; transform: translate(0,0) scale(0.4) rotate(0deg); }
  20%  { opacity: 1; }
  100% { opacity: 0; transform: translate(var(--tx,0), var(--ty,-60px)) scale(1) rotate(var(--rot,20deg)); }
}

/* ════════════════════════════
   TEST PANEL
════════════════════════════ */
#test-panel {
  width: 240px;
  flex-shrink: 0;
  background: linear-gradient(160deg, #1a1008 0%, #0f0a05 100%);
  border: 1px solid rgba(184,115,51,0.3);
  border-radius: 6px;
  padding: 24px 20px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(212,168,85,0.06);
}

.panel-title {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--gold);
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 20px;
  opacity: 0.8;
}

.panel-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(184,115,51,0.3), transparent);
  margin: 14px 0;
}

.panel-section-label {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 0.18em;
  color: var(--mist);
  text-transform: uppercase;
  margin-bottom: 8px;
  opacity: 0.6;
}

.panel-input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(184,115,51,0.2);
  border-radius: 3px;
  padding: 8px 10px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  color: var(--pale);
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 10px;
}

.panel-input:focus {
  border-color: rgba(184,115,51,0.5);
}

.panel-input::placeholder {
  color: rgba(200,184,154,0.3);
}

.panel-select {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(184,115,51,0.2);
  border-radius: 3px;
  padding: 8px 10px;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--pale);
  outline: none;
  cursor: pointer;
  appearance: none;
  margin-bottom: 10px;
  transition: border-color 0.2s;
}

.panel-select:focus { border-color: rgba(184,115,51,0.5); }

.panel-select option {
  background: #1a1008;
  color: var(--pale);
}

.fire-btn {
  width: 100%;
  padding: 11px;
  background: linear-gradient(135deg, #3a2010 0%, #2a1508 100%);
  border: 1px solid var(--copper);
  border-radius: 3px;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--gold);
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.2s, box-shadow 0.2s;
  position: relative;
  overflow: hidden;
}

.fire-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(184,115,51,0) 0%, rgba(184,115,51,0.1) 100%);
  opacity: 0;
  transition: opacity 0.2s;
}

.fire-btn:hover { box-shadow: 0 0 16px rgba(184,115,51,0.25); }
.fire-btn:hover::before { opacity: 1; }
.fire-btn:active { transform: scale(0.98); }

.quick-label {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 0.16em;
  color: var(--mist);
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 10px;
  opacity: 0.5;
}

.quick-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.quick-btn {
  padding: 7px 4px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(184,115,51,0.15);
  border-radius: 3px;
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.06em;
  color: var(--mist);
  cursor: pointer;
  text-align: center;
  transition: background 0.2s, border-color 0.2s, color 0.2s;
}

.quick-btn:hover {
  background: rgba(184,115,51,0.12);
  border-color: rgba(184,115,51,0.4);
  color: var(--pale);
}

.quick-btn.follower-q:hover  { border-color: rgba(143,191,138,0.5); color: #a8d4a3; }
.quick-btn.subscriber-q:hover { border-color: rgba(212,168,85,0.5); color: var(--gold); }
.quick-btn.donation-q:hover  { border-color: rgba(232,185,106,0.5); color: #f5c878; }
.quick-btn.raid-q:hover      { border-color: rgba(184,159,212,0.5); color: #cdb8e8; }
</style>
</head>
<body>

<!-- ALERT DISPLAY AREA -->
<div id="alert-area"></div>

<!-- TEST PANEL -->
<div id="test-panel">
  <div class="panel-title">⬡ Alert Tester ⬡</div>

  <div class="panel-section-label">Alert Type</div>
  <select class="panel-select" id="sel-type">
    <option value="follower">🌿 New Follower</option>
    <option value="subscriber">⭐ New Subscriber</option>
    <option value="donation">💰 Donation</option>
    <option value="raid">⚔️ Raid</option>
  </select>

  <div class="panel-section-label">Username</div>
  <input class="panel-input" id="inp-name" type="text" placeholder="TrashPanda99" value="TrashPanda99" />

  <div class="panel-section-label">Detail <span style="opacity:.4">(months / amount / raiders)</span></div>
  <input class="panel-input" id="inp-detail" type="text" placeholder="e.g. $5.00 or 3 months" />

  <button class="fire-btn" onclick="fireCustom()">⟡ Fire Alert ⟡</button>

  <div class="panel-divider"></div>

  <div class="quick-label">Quick Fire</div>
  <div class="quick-btns">
    <button class="quick-btn follower-q"   onclick="triggerAlert('follower','TrashPanda99','')">Follow</button>
    <button class="quick-btn subscriber-q" onclick="triggerAlert('subscriber','NightWasher','3 months')">Sub</button>
    <button class="quick-btn donation-q"   onclick="triggerAlert('donation','RaccoonFan','$5.00')">Donate</button>
    <button class="quick-btn raid-q"       onclick="triggerAlert('raid','BanditsGuild','42 raiders')">Raid</button>
  </div>
</div>

var CONFIGS = {
  follower:   { label: 'New Follower',   sub: 'Welcome to the trash pile \uD83E\uDD9D', particles: ['\uD83C\uDF3F','\uD83C\uDF42','\u2728','\uD83C\uDF43','\uD83C\uDF3F'] },
  subscriber: { label: 'New Subscriber', sub: 'Thank you so much!',                    particles: ['\u2B50','\u2728','\uD83D\uDC9B','\uD83C\uDF1F','\u2B50'] },
  donation:   { label: 'Donation',       sub: 'You absolute legend!',                   particles: ['\uD83D\uDCB0','\u2728','\uD83E\uDE99','\uD83D\uDCB0','\u2728'] },
  raid:       { label: 'Incoming Raid',  sub: 'Welcome, raiders!',                      particles: ['\u2694\uFE0F','\uD83C\uDF1F','\u2728','\uD83E\uDD9D','\u2694\uFE0F'] },
};

function buildMessage(type, name, detail) {
  var n = '<span class="alert-name">' + name + '</span>';
  var d = detail ? '<span class="alert-name">' + detail + '</span>' : '';
  if (type === 'follower')   return n + ' just followed!';
  if (type === 'subscriber') return 'New Sub: ' + n + (detail ? ' <span style="font-size:16px;opacity:.6">· ' + detail + '</span>' : '');
  if (type === 'donation')   return n + ' donated ' + d + '!';
  if (type === 'raid')       return n + ' is raiding!' + (detail ? '<br><span style="font-size:15px;opacity:.6">' + detail + '</span>' : '');
  return name;
}

/* ════════════════════════════
   AUDIO — Web Audio chimes
════════════════════════════ */
var audioCtx = null;

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// Play a single bell tone: freq, start time (offset from now), duration, volume
function bell(ctx, freq, when, dur, vol) {
  vol = vol || 0.5;
  var osc  = ctx.createOscillator();
  var gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, when);
  // Slightly detune a second oscillator for richness
  var osc2  = ctx.createOscillator();
  var gain2 = ctx.createGain();
  osc2.connect(gain2);
  gain2.connect(ctx.destination);
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(freq * 2.005, when); // slight upper harmonic
  gain2.gain.setValueAtTime(vol * 0.18, when);
  gain2.gain.exponentialRampToValueAtTime(0.0001, when + dur * 0.9);
  osc2.start(when);
  osc2.stop(when + dur);

  // Bell envelope: sharp attack, long exponential decay
  gain.gain.setValueAtTime(0.0001, when);
  gain.gain.linearRampToValueAtTime(vol, when + 0.008);
  gain.gain.exponentialRampToValueAtTime(0.0001, when + dur);

  osc.start(when);
  osc.stop(when + dur);
}

// Melodies — each is an array of [freq, timeOffset, duration, volume]
var CHIMES = {
  // Follower: gentle ascending 3-note chime, soft & airy
  follower: function(ctx, t) {
    bell(ctx, 880,  t,        1.4, 0.32);  // A5
    bell(ctx, 1047, t + 0.18, 1.2, 0.28); // C6
    bell(ctx, 1319, t + 0.36, 1.6, 0.24); // E6
    bell(ctx, 1760, t + 0.60, 2.0, 0.18); // A6 shimmer
  },
  // Subscriber: warm celebratory 4-note ascending arpeggio
  subscriber: function(ctx, t) {
    bell(ctx, 523,  t,        1.8, 0.38); // C5
    bell(ctx, 659,  t + 0.15, 1.6, 0.34); // E5
    bell(ctx, 784,  t + 0.30, 1.5, 0.30); // G5
    bell(ctx, 1047, t + 0.45, 2.2, 0.38); // C6 — big finish
    bell(ctx, 1319, t + 0.70, 1.8, 0.18); // E6 sparkle
  },
  // Donation: bright coin-like shimmer, two quick high pings then a warm low bell
  donation: function(ctx, t) {
    bell(ctx, 1568, t,        0.8, 0.30); // G6 — bright ping
    bell(ctx, 1760, t + 0.10, 0.7, 0.28); // A6 — brighter ping
    bell(ctx, 1319, t + 0.22, 1.0, 0.22); // E6
    bell(ctx, 784,  t + 0.40, 2.2, 0.40); // G5 — warm resonant
    bell(ctx, 523,  t + 0.65, 2.0, 0.20); // C5 low warmth
  },
  // Raid: dramatic descending-then-rising fanfare
  raid: function(ctx, t) {
    bell(ctx, 392,  t,        1.4, 0.36); // G4 — low rumble bell
    bell(ctx, 494,  t + 0.20, 1.2, 0.30); // B4
    bell(ctx, 659,  t + 0.38, 1.2, 0.28); // E5
    bell(ctx, 523,  t + 0.54, 1.0, 0.24); // C5 dip
    bell(ctx, 784,  t + 0.70, 1.8, 0.38); // G5 rise
    bell(ctx, 1047, t + 0.92, 2.0, 0.34); // C6 triumph
    bell(ctx, 1319, t + 1.15, 1.6, 0.20); // E6 shimmer out
  }
};

function playChime(type) {
  try {
    var ctx  = getCtx();
    var fn   = CHIMES[type] || CHIMES['follower'];
    fn(ctx, ctx.currentTime + 0.05);
  } catch(e) {
    // Audio unavailable — silent fail
  }
}

/* ════════════════════════════
   QUEUE
════════════════════════════ */
var alertQueue = [];
var alertBusy = false;

function triggerAlert(type, name, detail) {
  alertQueue.push({ type: type, name: name || 'Someone', detail: detail || '' });
  if (!alertBusy) processQueue();
}

function fireCustom() {
  var type   = document.getElementById('sel-type').value;
  var name   = document.getElementById('inp-name').value.trim() || 'TrashPanda99';
  var detail = document.getElementById('inp-detail').value.trim();
  triggerAlert(type, name, detail);
}

function processQueue() {
  if (alertQueue.length === 0) { alertBusy = false; return; }
  alertBusy = true;
  var item = alertQueue.shift();
  showAlert(item.type, item.name, item.detail, function() {
    setTimeout(processQueue, 600);
  });
}

function showAlert(type, name, detail, onDone) {
  var container = document.getElementById('alert-area');
  var cfg = CONFIGS[type] || { label: type, sub: '', particles: ['\u2728'] };

  var alertEl = document.createElement('div');
  alertEl.className = 'alert ' + type;

  alertEl.innerHTML =
    '<div class="card">' +
      '<div class="content">' +
        '<div class="raccoon-wrap">' + RACCOON_SVG + '</div>' +
        '<div class="divider"></div>' +
        '<div class="text-block">' +
          '<div class="alert-type-label">' + cfg.label + '</div>' +
          '<div class="alert-message">' + buildMessage(type, name, detail) + '</div>' +
          '<div class="alert-sub">' + cfg.sub + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="underline-wrap">' + buildUnderlineSVG(type) + '</div>' +
    '</div>';

  container.appendChild(alertEl);

  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      alertEl.classList.add('show');
      spawnParticles(alertEl, cfg.particles);
      playChime(type);
    });
  });

  setTimeout(function() {
    alertEl.classList.remove('show');
    alertEl.classList.add('hide');
    setTimeout(function() {
      alertEl.remove();
      onDone();
    }, 500);
  }, 5500);
}

function spawnParticles(el, emojis) {
  for (var i = 0; i < 12; i++) {
    (function(idx) {
      setTimeout(function() {
        var p = document.createElement('span');
        p.className = 'particle';
        p.textContent = emojis[idx % emojis.length];
        p.style.setProperty('--tx', (Math.random() * 140 - 70) + 'px');
        p.style.setProperty('--ty', (-45 - Math.random() * 65) + 'px');
        p.style.setProperty('--rot', (Math.random() * 70 - 35) + 'deg');
        p.style.setProperty('--dur', (1.0 + Math.random() * 0.9) + 's');
        p.style.left = (50 + Math.random() * 360) + 'px';
        p.style.top  = (10 + Math.random() * 70) + 'px';
        el.appendChild(p);
        setTimeout(function() { if (p.parentNode) p.parentNode.removeChild(p); }, 2100);
      }, idx * 110);
    })(i);
  }
}

// OBS URL param trigger
var params = new URLSearchParams(window.location.search);
if (params.get('type')) {
  triggerAlert(params.get('type'), params.get('name') || 'Someone', params.get('detail') || '');
}
